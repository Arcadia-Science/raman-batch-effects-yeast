# Vale configuration for prose linting
# https://vale.sh/docs/topics/config/

StylesPath = .vale/styles

# Minimum alert level (suggestion, warning, error)
MinAlertLevel = suggestion

# Vocabulary for custom terms (scientific terminology)
Vocab = Raman

[*.md]
# Base styles to use
BasedOnStyles = Vale, write-good

# Rules from Vale style
Vale.Terms = YES
Vale.Repetition = YES
Vale.Spelling = NO  # Using cspell instead

# Rules from write-good
write-good.Passive = NO
write-good.TooWordy = YES
write-good.Weasel = YES
write-good.ThereIs = NO
